name: BlenDiff Scene Check

on:
  push:
    paths:
      - "**.blend"
      - "**.blendiff"
  pull_request:
    paths:
      - "**.blend"
      - "**.blendiff"

env:
  SIDECAR_PATH: "test.blendiff"
  PYTHON_VERSION: "3.11"

jobs:
  scene-diff:
    name: Check scene changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install BlenDiff
        run: echo "PYTHONPATH=$PYTHONPATH:." >> $GITHUB_ENV

      - name: List snapshots
        run: |
          python -m blendiff.cli list ${{ env.SIDECAR_PATH }}

      - name: Diff latest two snapshots
        run: |
          python -m blendiff.cli latest ${{ env.SIDECAR_PATH }} \
            --output diff_report.html

      - name: Upload HTML diff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blendiff-report
          path: diff_report.html
          retention-days: 30

  scene-diff-approved:
    name: Check against approved baseline
    runs-on: ubuntu-latest
    if: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install BlenDiff
        run: echo "PYTHONPATH=$PYTHONPATH:." >> $GITHUB_ENV

      - name: Diff against approved baseline
        run: |
          python -m blendiff.cli compare ${{ env.SIDECAR_PATH }} \
            "Last approved" \
            "$(python -m blendiff.cli list ${{ env.SIDECAR_PATH }} --json | python -c 'import json,sys; print(json.load(sys.stdin)[0]["label"])')" \
            --output diff_report.html \
            --fail-on-changes

      - name: Upload HTML diff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blendiff-approved-report
          path: diff_report.html